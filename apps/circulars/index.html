<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>電子回覧板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Noto Sans JP"', '"Hiragino Sans"', '"Hiragino Kaku Gothic ProN"', '"Meiryo"', 'sans-serif'],
            },
            colors: {
              primary: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                700: '#0369a1',
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        font-family: "Noto Sans JP", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .prose {
        color: #334155;
        line-height: 1.75;
      }
      .prose h2 {
        font-size: 1.125rem;
        font-weight: 700;
        margin-top: 1rem;
        margin-bottom: 0.5rem;
        color: #1e293b;
      }
      .prose h3 {
        font-size: 1rem;
        font-weight: 600;
        margin-top: 0.75rem;
        margin-bottom: 0.5rem;
        color: #334155;
      }
      .prose p {
        margin-top: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .prose ul, .prose ol {
        margin-top: 0.5rem;
        margin-bottom: 0.5rem;
        padding-left: 1.5rem;
      }
      .prose li {
        margin-top: 0.25rem;
        margin-bottom: 0.25rem;
      }
      .prose strong {
        color: #0f172a;
        font-weight: 600;
      }
      .prose a {
        color: #2563eb;
        text-decoration: underline;
      }
      .prose code {
        color: #dc2626;
        font-size: 0.875em;
        font-weight: 500;
      }
      .prose pre {
        background-color: #f1f5f9;
        padding: 0.75rem;
        border-radius: 0.375rem;
        overflow-x: auto;
        margin-top: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .prose blockquote {
        border-left: 3px solid #cbd5e1;
        padding-left: 1rem;
        color: #64748b;
        font-style: italic;
        margin-top: 0.5rem;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
